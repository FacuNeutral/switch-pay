<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!--
    Switch Pay — Isotipo "S" estilizada
    Color sólido · Fondo transparente · Sin degradados
    ► Para cambiar el color, editar fill="#34D399"
  -->
  <g fill="#34D399" transform="rotate(-45 50 50)">
    <!--
      Pre-rotación (horizontal):
        Superior:  rect corto arriba-derecha
        Central:   rect largo centrado
        Inferior:  rect corto abajo-izquierda
      
      Tras rotate(-45°) → forman la "S" diagonal
    -->

    <!-- Barra superior (remate derecho de la S) -->
    <rect x="50" y="12" width="44" height="19" rx="9.5"/>

    <!-- Barra central (diagonal principal) -->
    <rect x="5" y="40" width="90" height="21" rx="10.5"/>

    <!-- Barra inferior (remate izquierdo de la S) -->
    <rect x="6" y="69" width="44" height="19" rx="9.5"/>
  </g>
</svg>
